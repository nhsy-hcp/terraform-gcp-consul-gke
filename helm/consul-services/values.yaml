# Default values for consul-services
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: demo
  consulNamespace: consul

# API service configuration (renamed from backend)
api:
  enabled: true
  name: api
  replicas: 2
  image:
    repository: hashicorp/http-echo
    tag: latest
    pullPolicy: IfNotPresent

  service:
    port: 80
    targetPort: 9090

  container:
    port: 9090
    message: "Hello from the API service!"

  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "200m"

  # Consul Connect annotations
  consul:
    connect:
      enabled: true

# Web service configuration (renamed from frontend)
web:
  enabled: true
  name: web
  replicas: 2
  image:
    repository: hashicorp/http-echo
    tag: latest
    pullPolicy: IfNotPresent

  service:
    port: 80
    targetPort: 9090

  container:
    port: 9090
    message: "Hello from the Web UI!"

  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "200m"

  # Consul Connect annotations
  consul:
    connect:
      enabled: true
    upstreams:
      - name: api
        port: 9091

  # Environment variables
  env:
    - name: API_URL
      value: "http://localhost:9091"

# Service Intentions
intentions:
  enabled: true
  rules:
    # Allow web and api-gateway -> api
    - destination: api
      sources:
        - name: web
          action: allow
        - name: api-gateway
          action: allow

    # Allow api-gateway -> web
    - destination: web
      sources:
        - name: api-gateway
          action: allow

# HTTP Routes configuration
routes:
  enabled: true

  # Gateway reference
  gateway:
    name: api-gateway
    namespace: consul

  # Web route (root path)
  web:
    enabled: true
    name: web-route
    hostname: demo.example.com
    path: /

  # API route (/api path)
  api:
    enabled: true
    name: api-route
    hostname: demo.example.com
    path: /api
