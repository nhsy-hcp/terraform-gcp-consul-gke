{{- if .Values.routes.enabled }}
{{- if .Values.routes.web.enabled }}
---
# Route / to web service
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.web.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version }}
    release: {{ $.Release.Name }}
    app: {{ .Values.web.name }}
spec:
  parentRefs:
    - name: {{ .Values.routes.gateway.name }}
      namespace: {{ .Values.routes.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .Values.routes.web.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.web.path }}
      backendRefs:
        - kind: Service
          name: {{ .Values.web.name }}
          port: {{ .Values.web.service.port }}
{{- end }}

{{- if .Values.routes.api.enabled }}
---
# Route /api to api service
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.api.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version }}
    release: {{ $.Release.Name }}
    app: {{ .Values.api.name }}
spec:
  parentRefs:
    - name: {{ .Values.routes.gateway.name }}
      namespace: {{ .Values.routes.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .Values.routes.api.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.api.path }}
      backendRefs:
        - kind: Service
          name: {{ .Values.api.name }}
          port: {{ .Values.api.service.port }}
{{- end }}
{{- end }}
