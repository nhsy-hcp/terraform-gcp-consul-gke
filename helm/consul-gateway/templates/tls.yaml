{{- range $type, $issuer := .Values.tls.clusterIssuer }}
{{- if and (kindIs "map" $issuer) $issuer.enabled }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ $issuer.name }}
  labels:
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version }}
    release: {{ $.Release.Name }}
spec:
  acme:
    server: {{ $issuer.server }}
    email: {{ $.Values.tls.clusterIssuer.email }}
    privateKeySecretRef:
      name: {{ $issuer.name }}-account-key
    solvers:
      - dns01:
          cloudDNS:
            project: {{ $.Values.global.projectId }}
{{- end }}
{{- end }}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tls.certificate.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  secretName: {{ .Values.tls.certificate.secretName }}
  duration: {{ .Values.tls.certificate.duration }}
  renewBefore: {{ .Values.tls.certificate.renewBefore }}
  isCA: false
  privateKey:
    algorithm: {{ .Values.tls.certificate.privateKey.algorithm }}
    size: {{ .Values.tls.certificate.privateKey.size }}
    rotationPolicy: {{ .Values.tls.certificate.privateKey.rotationPolicy }}
  usages:
    - server auth
  dnsNames:
    {{- range .Values.tls.certificate.dnsNames }}
    - {{ . | quote }}
    {{- end }}
  issuerRef:
    name: {{ .Values.tls.certificate.issuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
