# Default values for consul-gateway
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  namespace: consul
  domain: example.com
  projectId: my-gcp-project

# API Gateway configuration
gateway:
  enabled: true
  name: api-gateway
  gatewayClassName: consul
  loadBalancerSourceRanges: []

  # HTTPS listener (TLS termination)
  https:
    port: 443
    hostname: "*.example.com"
    tlsSecretName: api-gateway-tls
    tlsMinVersion: "TLSv1_2"

# ReferenceGrant for cross-namespace routing
referenceGrant:
  enabled: true
  name: allow-gateway-to-services
  targetNamespace: demo

# TLS/Certificate configuration
tls:
  enabled: true

  # ClusterIssuer configuration
  clusterIssuer:
    email: admin@example.com
    staging:
      enabled: true
      name: letsencrypt-staging
      server: https://acme-staging-v02.api.letsencrypt.org/directory

    production:
      enabled: true
      name: letsencrypt-prod
      server: https://acme-v02.api.letsencrypt.org/directory

  # Certificate configuration
  certificate:
    enabled: true
    name: api-gateway-cert
    secretName: api-gateway-tls
    duration: 168h  # 7 days
    renewBefore: 120h  # 5 days
    dnsNames:
      - demo.example.com
    issuerName: letsencrypt-staging  # Use letsencrypt-prod after testing

    # Private key configuration
    privateKey:
      algorithm: ECDSA  # Use ECDSA instead of RSA for smaller key sizes and better performance
      size: 256  # P-256 curve (can be 256 or 384)
      rotationPolicy: Always  # Rotate private key on certificate renewal
