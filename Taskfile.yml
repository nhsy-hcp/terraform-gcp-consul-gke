version: '3'

vars:
  PROJECT_ROOT:
    sh: pwd
  CONSUL_NAMESPACE:
    sh: cd terraform && (terraform output -raw consul_namespace 2>/dev/null | grep . || echo "consul")
  CERT_MANAGER_NAMESPACE:
    sh: cd terraform && (terraform output -raw cert_manager_namespace 2>/dev/null | grep . || echo "cert-manager")
  DEMO_NAMESPACE:
    sh: cd terraform && (terraform output -raw demo_namespace 2>/dev/null | grep . || echo "demo")
  # Timeout values for wait conditions (in seconds)
  CERT_MANAGER_INIT_TIMEOUT: "120"
  CERTIFICATE_TIMEOUT: "300"
  GATEWAY_TIMEOUT: "600"
  LOADBALANCER_TIMEOUT: "300"
  RECONCILIATION_BUFFER: "60"

env:
  HELM_CACHE_HOME: "{{.PROJECT_ROOT}}/.tmp/helm/cache"
  HELM_CONFIG_HOME: "{{.PROJECT_ROOT}}/.tmp/helm/config"
  HELM_DATA_HOME: "{{.PROJECT_ROOT}}/.tmp/helm/data"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  init:
    desc: Initialize Terraform and download providers
    dir: terraform
    cmds:
      - terraform init
      - echo "✓ Terraform initialized"

  setup:
    desc: Setup Helm repositories and search for Consul versions
    cmds:
      - mkdir -p {{.PROJECT_ROOT}}/.tmp/helm/{cache,config,data}
      - helm repo add hashicorp https://helm.releases.hashicorp.com
      - helm repo update
      - helm search repo hashicorp/consul --versions

  validate:
    desc: Validate Terraform configuration
    dir: terraform
    cmds:
      - terraform validate
      - echo "✓ Terraform configuration is valid"

  terraform:check-vars:
    internal: true
    cmds:
      - |
        if [ ! -f terraform/terraform.tfvars ]; then
          echo "ERROR: terraform/terraform.tfvars is missing. Please create it with your configuration values."
          exit 1
        fi
    silent: true

  plan:
    desc: Show Terraform execution plan
    dir: terraform
    deps:
      - validate
      - terraform:check-vars
    cmds:
      - terraform plan

  refresh:
    desc: Refresh Terraform state to match real infrastructure
    dir: terraform
    cmds:
      - terraform refresh
      - echo "✓ Terraform state refreshed"

  # ------------------------------------------------------------------------------
  # Deployment Workflows
  # ------------------------------------------------------------------------------

  confirm:
    prompt: "Continue with the next step?"
    status:
      - '[[ "{{.CLI_ARGS}}" == *"--yes"* ]]'

  apply:
    deps: [init]
    desc: "Staged deployment (prereqs → gke → consul → cert-manager → helm-charts with confirmations, use -- --yes to skip)"
    silent: true
    cmds:
      - task: validate
      - task: apply:prereqs
      - echo "Prerequisites (VPC, APIs) created. Review outputs before continuing."
      - task: confirm
        vars:
          CLI_ARGS: '{{.CLI_ARGS}}'
      - task: apply:gke
      - echo "GKE cluster created. Review outputs before continuing."
      - task: refresh
      - task: gke:credentials
      - task: confirm
        vars:
          CLI_ARGS: '{{.CLI_ARGS}}'
      - task: apply:consul
      - echo "Consul service mesh deployed. Review outputs before continuing."
      - task: confirm
        vars:
          CLI_ARGS: '{{.CLI_ARGS}}'
      - task: apply:cert-manager
      - echo "cert-manager deployed. Review outputs before continuing."
      - task: confirm
        vars:
          CLI_ARGS: '{{.CLI_ARGS}}'
      - task: apply:helm-charts

  apply:prereqs:
    desc: Stage 1 - Deploy prerequisites (VPC, APIs, etc)
    dir: terraform
    deps:
      - terraform:check-vars
    cmds:
      - terraform apply -target=module.prereqs -auto-approve

  apply:gke:
    desc: Stage 2 - Deploy GKE cluster
    dir: terraform
    deps:
      - terraform:check-vars
    cmds:
      - terraform apply -target=module.gke -auto-approve

  apply:consul:
    desc: Stage 3 - Deploy Consul service mesh
    dir: terraform
    deps:
      - terraform:check-vars
    cmds:
      - terraform apply -target=module.consul -auto-approve

  apply:cert-manager:
    desc: Stage 4 - Deploy cert-manager
    dir: terraform
    deps:
      - terraform:check-vars
    silent: true
    cmds:
      - terraform apply -target=module.cert_manager -auto-approve
      - echo "Waiting for cert-manager deployment to be available..."
      - kubectl wait --for=condition=available deployment/cert-manager -n {{.CERT_MANAGER_NAMESPACE}} --timeout={{.CERT_MANAGER_INIT_TIMEOUT}}s
      - kubectl wait --for=condition=available deployment/cert-manager-webhook -n {{.CERT_MANAGER_NAMESPACE}} --timeout={{.CERT_MANAGER_INIT_TIMEOUT}}s
      - kubectl wait --for=condition=available deployment/cert-manager-cainjector -n {{.CERT_MANAGER_NAMESPACE}} --timeout={{.CERT_MANAGER_INIT_TIMEOUT}}s
      - echo "Waiting for cert-manager to initialize ACME client..."
      - sleep 30
      - echo "✓ cert-manager deployed and initialized"

  validate:gateway-crds:
    desc: Verify Gateway API CRDs are installed
    silent: true
    cmds:
      - bash scripts/validate-gateway-crds.sh

  apply:helm-charts:
    desc: Stage 5 - Deploy application helm charts via Terraform (staged)
    dir: terraform
    deps:
      - terraform:check-vars
      - validate:gateway-crds
    cmds:
      - task: apply:gateway
      - task: apply:services
      - task: apply:verify

  apply:gateway:
    desc: Deploy API Gateway with TLS certificate
    dir: terraform
    deps:
      - terraform:check-vars
      - validate:gateway-crds
    silent: true
    cmds:
      - echo "Deploying API Gateway and TLS certificate..."
      - terraform apply -target=module.consul_gateway.helm_release.consul_gateway -auto-approve
      - echo "Waiting for TLS certificate to be issued (timeout {{.CERTIFICATE_TIMEOUT}}s)..."
      - kubectl wait --for=condition=ready certificate/api-gateway-cert -n {{.CONSUL_NAMESPACE}} --timeout={{.CERTIFICATE_TIMEOUT}}s
      - bash scripts/wait-for-tls-secret.sh {{.CONSUL_NAMESPACE}} api-gateway-tls
      - bash scripts/wait-for-gateway-ready.sh {{.CONSUL_NAMESPACE}} api-gateway {{.GATEWAY_TIMEOUT}}
      - echo "✓ Gateway and TLS certificate deployed and ready"

  apply:services:
    desc: Deploy services with HTTPRoutes
    dir: terraform
    deps:
      - terraform:check-vars
      - validate:gateway-crds
    silent: true
    cmds:
      - echo "Deploying services and HTTPRoutes..."
      - terraform apply -target=module.consul_services.helm_release.consul_services -auto-approve
      - echo "Waiting for service pods to be ready..."
      - kubectl wait --for=condition=ready pod -l app=api -n {{.DEMO_NAMESPACE}} --timeout=120s || echo "⚠ API pod not ready"
      - kubectl wait --for=condition=ready pod -l app=web -n {{.DEMO_NAMESPACE}} --timeout=120s || echo "⚠ Web pod not ready"
      - bash scripts/wait-for-loadbalancer-ip.sh {{.CONSUL_NAMESPACE}} component=api-gateway {{.LOADBALANCER_TIMEOUT}}
      - echo "✓ Services and routes deployed"

  apply:verify:
    desc: Verify complete deployment and connectivity
    dir: terraform
    deps:
      - terraform:check-vars
    silent: true
    cmds:
      - echo "Finalizing deployment..."
      - terraform apply -auto-approve

      # Final reconciliation buffer
      - echo "Allowing {{.RECONCILIATION_BUFFER}}s for final controller reconciliation..."
      - sleep {{.RECONCILIATION_BUFFER}}

      # Show Gateway status before verification
      - echo "Gateway readiness status:"
      - >
        kubectl get gateway api-gateway -n {{.CONSUL_NAMESPACE}} -o jsonpath='{.status.conditions}' | jq '.'
        || kubectl get gateway api-gateway -n {{.CONSUL_NAMESPACE}} -o yaml | grep -A 20 "conditions:"

      # Show HTTPRoutes
      - echo "Verifying HTTPRoutes..."
      - kubectl get httproute -n {{.DEMO_NAMESPACE}} -o wide

      # Run comprehensive TLS verification
      - echo "Running comprehensive TLS verification..."
      - task: verify:gateway-tls

      - echo "✓ Deployment complete and verified"

  destroy:
    desc: Destroy all Terraform-managed infrastructure
    dir: terraform
    cmds:
      - task: uninstall
      - terraform destroy

  destroy:auto:
    desc: Destroy all infrastructure without confirmation
    dir: terraform
    cmds:
      - task: uninstall
      - terraform destroy -auto-approve

  gke:credentials:
    desc: Get GKE cluster credentials
    silent: true
    dir: terraform
    vars:
      CLUSTER_NAME:
        sh: terraform output -raw cluster_name
      REGION:
        sh: terraform output -raw region
      PROJECT_ID:
        sh: terraform output -raw project_id
    cmds:
      - gcloud container clusters get-credentials {{.CLUSTER_NAME}} --region {{.REGION}} --project {{.PROJECT_ID}} --dns-endpoint
      - echo "✓ Cluster credentials configured"
      - kubectl cluster-info

  status:
    desc: Show status of all components
    cmds:
      - bash scripts/show-status.sh {{.CONSUL_NAMESPACE}}

  consul:token:
    desc: Retrieve Consul bootstrap ACL token
    cmds:
      - bash scripts/get-consul-token.sh {{.CONSUL_NAMESPACE}}

  ui:
    desc: Open Web UI, API, and Consul UI in browser
    dir: terraform
    silent: true
    cmds:
      - |
        WEB_URL=$(terraform output -raw demo_web_url 2>/dev/null || true)
        API_URL=$(terraform output -raw demo_api_url 2>/dev/null || true)
        CONSUL_URL=$(terraform output -raw consul_url 2>/dev/null || true)

        if [ -z "$WEB_URL" ] || [ -z "$API_URL" ] || [ -z "$CONSUL_URL" ]; then
          echo "Error: Unable to retrieve URLs from Terraform outputs."
          echo "Ensure infrastructure is deployed with 'task apply'."
          exit 1
        fi

        echo "Opening Consul UI at $CONSUL_URL"
        open "$CONSUL_URL" || xdg-open "$CONSUL_URL" || echo "Please open $CONSUL_URL in your browser"
        echo "Opening Web UI at $WEB_URL"
        open "$WEB_URL" || xdg-open "$WEB_URL" || echo "Please open $WEB_URL in your browser"
        echo "Opening API at $API_URL"
        open "$API_URL" || xdg-open "$API_URL" || echo "Please open $API_URL in your browser"

  ui:consul:
    desc: Open Consul UI in browser
    dir: terraform
    silent: true
    cmds:
      - |
        CONSUL_URL=$(terraform output -raw consul_url 2>/dev/null || true)
        if [ -z "$CONSUL_URL" ]; then
          echo "Error: Unable to retrieve Consul UI URL from Terraform outputs."
          echo "Ensure infrastructure is deployed with 'task apply'."
          exit 1
        fi
        echo "Opening Consul UI at $CONSUL_URL"
        open "$CONSUL_URL" || xdg-open "$CONSUL_URL" || echo "Please open $CONSUL_URL in your browser"

  ui:gateway:
    desc: Open API Gateway URL in browser
    dir: terraform
    silent: true
    cmds:
      - |
        GATEWAY_URL=$(terraform output -raw consul_fqdn 2>/dev/null || true)
        if [ -z "$GATEWAY_URL" ]; then
          echo "Error: Unable to retrieve API Gateway URL from Terraform outputs."
          echo "Ensure infrastructure is deployed with 'task apply'."
          exit 1
        fi
        echo "Opening API Gateway at $GATEWAY_URL"
        open "$GATEWAY_URL" || xdg-open "$GATEWAY_URL" || echo "Please open $GATEWAY_URL in your browser"

  gateway:ip:
    desc: Get API Gateway external IP
    cmds:
      - |
        GATEWAY_SVC=$(kubectl get svc -n {{.CONSUL_NAMESPACE}} -l component=api-gateway -o name | head -n 1 || true)
        if [ -z "$GATEWAY_SVC" ]; then
          echo "Error: API Gateway service not found in namespace {{.CONSUL_NAMESPACE}}."
          echo "Please run 'task deploy:gateway' first."
          exit 1
        fi

        GATEWAY_IP=$(kubectl get "$GATEWAY_SVC" -n {{.CONSUL_NAMESPACE}} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || true)
        if [ -z "$GATEWAY_IP" ]; then
          echo "Waiting for external IP assignment for $GATEWAY_SVC..."
          echo "This may take a few minutes."
        else
          echo "API Gateway External IP for $GATEWAY_SVC: $GATEWAY_IP"
        fi
    silent: true

  test:
    desc: Run all tests
    cmds:
      - task: test:gateway

  test:gateway:
    desc: Test API Gateway endpoints
    cmds:
      - bash scripts/test-gateway.sh {{.CONSUL_NAMESPACE}} {{.DEMO_NAMESPACE}}

  verify:gateway-tls:
    desc: Verify API Gateway TLS certificate status and configuration
    cmds:
      - bash scripts/verify-gateway-tls.sh {{.CONSUL_NAMESPACE}} {{.CERT_MANAGER_NAMESPACE}}

  recreate:certificate:
    desc: Force recreation of API Gateway TLS certificate
    prompt: "This will delete the certificate and trigger a new issuance. Continue?"
    silent: true
    dir: terraform
    cmds:
      - echo "Deleting existing certificate resources..."
      - kubectl delete certificate api-gateway-cert -n {{.CONSUL_NAMESPACE}} --ignore-not-found=true
      - kubectl delete certificaterequest -n {{.CONSUL_NAMESPACE}} -l cert-manager.io/certificate-name=api-gateway-cert --ignore-not-found=true
      - kubectl delete challenges -n {{.CONSUL_NAMESPACE}} --all --ignore-not-found=true
      - kubectl delete secret api-gateway-tls -n {{.CONSUL_NAMESPACE}} --ignore-not-found=true
      - echo "Waiting 5 seconds for cleanup..."
      - sleep 5
      - echo "Redeploying certificate via Terraform..."
      - terraform apply -auto-approve
      - echo "✓ Certificate recreation triggered"

  consul:logs:
    desc: Show Consul server logs
    cmds:
      - kubectl logs -n {{.CONSUL_NAMESPACE}} -l component=server --tail=100 -f

  logs:connect-inject:
    desc: Show Consul connect-inject logs
    cmds:
      - kubectl logs -n {{.CONSUL_NAMESPACE}} -l component=connect-injector --tail=100 -f

  cert-manager:logs:
    desc: Show cert-manager logs
    cmds:
      - kubectl logs -n {{.CERT_MANAGER_NAMESPACE}} -l app=cert-manager --tail=100 -f

  uninstall:
    desc: Clean up Kubernetes resources (Helm releases and namespaces)
    silent: true
    cmds:
      - helm uninstall consul-gateway -n {{.CONSUL_NAMESPACE}} || true
      - helm uninstall consul-services -n {{.DEMO_NAMESPACE}} || true
      - helm uninstall consul -n {{.CONSUL_NAMESPACE}} || true
      - helm uninstall cert-manager -n {{.CERT_MANAGER_NAMESPACE}} || true
      - kubectl delete pvc --all -n {{.CONSUL_NAMESPACE}} --wait=false || true
      - kubectl delete namespace {{.CONSUL_NAMESPACE}} --wait=false || true
      - kubectl delete namespace {{.DEMO_NAMESPACE}} --wait=false || true
      - kubectl delete namespace {{.CERT_MANAGER_NAMESPACE}} --wait=false || true
      - echo "✓ Kubernetes resources, PVCs, and namespaces marked for deletion"

  clean:
    desc: Clean up temporary files and caches
    dir: terraform
    cmds:
      - rm -rf .terraform
      - rm -f terraform.tfstate*
      - rm -f .terraform.lock.hcl
      - echo "✓ Temporary files cleaned up"

  format:
    desc: Format Terraform files
    dir: terraform
    cmds:
      - terraform fmt -recursive
      - echo "✓ Terraform files formatted"

  lint:
    desc: Run all linting and validation checks
    cmds:
      - task: lint:terraform
      - task: lint:helm
      - pre-commit run --all-files
      - echo "✓ All checks passed"

  lint:terraform:
    desc: Run Terraform-specific linting
    dir: terraform
    cmds:
      - terraform fmt -check -recursive
      - terraform validate
      - echo "✓ Terraform checks passed"

  lint:helm:
    desc: Lint all Helm charts
    cmds:
      - helm lint helm/consul-gateway
      - helm lint helm/consul-services
      - echo "✓ Helm charts validated"

  lint:helm:strict:
    desc: Strict Helm validation with Kubernetes dry-run
    deps:
      - gke:credentials
    cmds:
      - echo "Validating consul-gateway chart..."
      - helm template test helm/consul-gateway | kubectl apply --dry-run=client -f -
      - echo "Validating consul-services chart..."
      - helm template test helm/consul-services | kubectl apply --dry-run=client -f -
      - echo "✓ Helm charts validated against Kubernetes API"

  docs:
    desc: Generate Terraform documentation
    cmds:
      - terraform-docs markdown table --output-file TERRAFORM.md .
      - echo "✓ Documentation generated in TERRAFORM.md"
    preconditions:
      - sh: command -v terraform-docs
        msg: "terraform-docs is not installed. Install from https://terraform-docs.io/"

  consul:reinstall:
    desc: Reinstall the Consul Helm release (Force uninstall + Terraform apply)
    deps:
      - terraform:check-vars
    cmds:
      - helm uninstall consul -n {{.CONSUL_NAMESPACE}} || true
      - sleep 30
      - task: apply:consul
      - echo "✓ Consul Helm release reinstalled"
